      METHODOLOGY: Build sparse block Helmholtz operator on joint (V, ω)
      state vector with Op14-modulated impedance set by Cosserat ansatz:

         A · ψ = λ · B · ψ        where ψ = (V, ω)^T, λ = ω_n²

