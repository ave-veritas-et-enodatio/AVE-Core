  - id: P_phase6_k4tlm_scattering_lctank
    name: "R7.1 multi-seed K4-TLM scatter+connect transmission eigenmode + Cosserat (u,ω) LC-tank Hessian: at least one seed returns ω_Compton bound state"
    type: derived_prediction
    pre_registered: true
    research_doc: "research/L3_electron_soliton/73_discrete_k4_tlm_lctank_operator.md"
    test_file: "src/scripts/vol_1_foundations/r7_k4tlm_scattering_lctank.py"
    axioms_used: [1, 2, 4]
    public_in_readme: false
    public_in_living_ref: false
    notes: |
      Round 7 Stage 1 — reframe 4 (final operator choice per doc 73_ §6.1
      Rule-10 commitment, §6.1 carve-out invoked on-record per Grant approval
      "confirmed 6.1" 2026-04-25). Replaces retracted P_phase6_helmholtz_-
      eigenmode_sweep (continuum-Laplacian V-block → discrete K4-TLM
      scatter+connect transmission operator per doc 73_ §2-§5).

      METHODOLOGY (per doc 73_ §2-§5):

      V-block — K4-TLM scatter+connect transmission eigenmode:
        T(z_local) = C · S(z_local)        T : ℂ^{4N_active × 4N_active}
      where:
        S(z_local) = block-diagonal scattering matrix per k4_tlm.py:36-65
                     (4×4 unitary block per active node)
        C = sparse permutation operator encoding neighbor(i,p) connectivity
            (per k4_tlm.py:348-426 _connect_all), opposite_port(p) = p
      Eigenvalue problem (UNITARY, eigenvalues on unit circle):
        T · ψ_V = exp(i·ω_n·dt) · ψ_V
      Solve via scipy.sparse.linalg.eigs(T, k=20, sigma=exp(i·ω_C·dt),
                                         which='LM') with shift-invert at
      target phase exp(i / √2) ≈ exp(i·0.7071) for ω_C = 1, dt = 1/√2 in
      natural units. PASS criterion on V-block: ∃ eigenvalue λ_n with
      |arg(λ_n) - ω_C·dt| < α·ω_C·dt = α/√2 ≈ 0.00516 rad.

      Cos-block — Cosserat (u, ω) LC-tank Hessian-of-W:
        K_cos · δψ_cos = ω² · M_cos · δψ_cos      (real-symmetric generalized)
      where:
        K_cos = ∂²W/∂(u, ω)² evaluated at seed configuration via FD HVP on
                engine.cos.energy_gradient (returns both dE_du, dE_dw)
        M_cos = block-diag(ρ·I_{3N³}, I_ω·I_{3N³})    mass matrix
      Solve via scipy.sparse.linalg.eigsh(K_cos_op, M=M_cos, k=20,
                                           which='SA', tol=1e-5).
      PASS criterion on Cos-block: ∃ eigenvalue λ_n > 0 with
      |√λ_n - ω_C| < α·ω_C ≈ 0.00731 (natural units).

      Op14 cross-coupling at V=0 seed: vanishes per doc 73_ §4.3 (multi-
      plicative in V; T·ψ_V = 0 when ψ_V = 0). Block decouples; eigsolve
      V-block and Cos-block independently. Hybrid V≠0 ∧ ω≠0 eigenmodes
      deferred to Round 8.

      Lattice: N=32, R_anchor=10. K4-TLM active sites = all-even ∪
      all-odd = 2·(N/2)³ = 8192 at N=32. V-block dim 4·8192 = 32768.
      Cos-block dim 6·N³ = 196608. Both tractable for sparse eigs/eigsh.

      Engine: A28 + Cosserat self-terms enabled. No saturation pin.
      A26 amplitude guard at step 0 (peak |ω| ∈ [0.85, 1.15]·0.3π for
      GT-family seeds).

      Seeds (4 total, unchanged from retracted P_phase6_helmholtz_eigenmode_-
      sweep):
      - GT_corpus:        R=10, r=10/φ²≈3.82  (corpus claim R/r=φ²)
      - F17K_cos_endpoint: R=10, r=10/3.40≈2.94 (F17-K v2-v2 Cosserat-energy)
      - F17K_s11_endpoint: R=10, r=10/1.03≈9.71 (F17-K v2-v2 coupled-S₁₁)
      - vacuum_control:    random low-amplitude (peak |ω|=0.05) — negative
                           control

      All GT-family seeds use amplitude_scale = 0.3 / (√3/2) ≈ 0.3464.

      EIGENMODE PASS criteria (binary, both required for headline PASS):
      - V-block: ∃ eigenvalue with |arg(λ) - ω_C·dt| < α/√2 ≈ 0.00516 rad
        AND topological crossing-count of mode shape c_eigvec = 3 (for V-block
        crossing-count is informational; the discrete K4-TLM scattering mode
        has port structure that doesn't directly map to Cosserat winding).
      - OR Cos-block: ∃ positive eigenvalue with |√λ - ω_C| < α·ω_C ≈ 0.00731
        AND c_eigvec = 3 on the eigenvector (computed via extract_crossing_-
        count on the ω-component of the eigenvector reshaped to (N, N, N, 3)).

      INFORMATIONAL DIAGNOSTICS (not PASS, reported per eigenmode passing
      binary):
      - Shape correlation > 0.60 against doc 34_ X4a profile (Q4 two-tier;
        only meaningful on Cos-block ω-component)
      - Sector-energy split: at V=0 seed this is trivially binary by which
        block returned the eigenmode (V-block dominant or Cos-block dominant);
        hybrid only at V≠0 seed (Round 8)
      - Negative eigenvalues at non-stationary Cos-block seeds (per doc 73_
        §3.6): expected, diagnostic of seed non-stationarity, not error

      PASS:
      At least one of {GT_corpus, F17K_cos_endpoint, F17K_s11_endpoint}
      returns an eigenmode satisfying binary PASS criterion in V-block OR
      Cos-block. vacuum_control returns no nontrivial eigenmode in either.

      THREE-MODE FALSIFICATION RESOLUTION (with sector sub-reading; per
      doc 73_ §1.1 reframe arc table):
      - (I) GT_corpus passes → corpus Golden Torus geometry vindicated.
        Sub-reading: which block hosted the eigenmode (V-sector standing
        wave OR Cos-sector LC oscillation OR both)
      - (II) F17K_cos and/or F17K_s11 passes; GT_corpus fails → engine
        basin at F17-K endpoint geometry, NOT corpus GT. Engine W or
        corpus geometry derivation needs revision.
      - (III) No seed passes at V=0 → either (2,3) representation needs
        structural rework (Round 8) OR bound state is genuinely hybrid
        coupled requiring V≠0 ∧ ω≠0 seed (Round 8 sub-question per
        doc 73_ §4.4).

      Negative-control failure: if vacuum_control returns nontrivial
      eigenmode satisfying binary PASS, sparse operator construction has
      assembly bug (likely connect-permutation error in V-block OR FD HVP
      asymmetry in Cos-block). Methodology not physics — re-check operator
      construction integrity before interpreting (I)/(II)/(III).

      §6.1 carve-out commitment (per doc 73_ §6 + doc 72_ §6.1): this is
      reframe 4 of R7.1 in this session arc. The fresh-session run
      committed against this pred is committed to operator choice. Post-run
      methodology adjustments allowed under Rule 10 ("data first, methodology
      adjustments after"); pre-emptive operator changes before run are NOT
      allowed except for catastrophic methodology error. A second §6.1
      invocation in Round 7 must be paired with formal verification /
      independent operator-math review before any further code lands.

      Driver `r7_k4tlm_scattering_lctank.py` (~250 LOC per doc 73_ §5)
      lands in same commit as this pred + run + interpretation in doc 74_.

  - id: P_phase6_lattice_resolution_sweep
    name: "R7.1 V-block lattice-resolution sweep: Mode III gap at N=32 (1.22%) does NOT close to within α/√2 PASS tolerance at N=64"
    type: derived_prediction
    pre_registered: true
    research_doc: "research/L3_electron_soliton/74_r7_k4tlm_lctank_run_result.md"
    test_file: "src/scripts/vol_1_foundations/r7_lattice_resolution_sweep.py"
    axioms_used: [1, 2, 4]
    public_in_readme: false
    public_in_living_ref: false
    notes: |
      R7.1 follow-up #3 per doc 74_ §6 + auditor concern #3 (commit 8c44ef0
      review). Pre-registered at this commit before run, per Rule 10 "data
      first, methodology after" — prevents retroactive adjudication of the
      lattice-resolution sweep's outcome.

      MOTIVATION: The doc 74_ Mode III result is comprehensive in V-block
      (shift-invert directly targets ω_C·dt closest mode) but at fixed
      N=32. If the K4-TLM dispersion at N=32 has no eigenmode within
      α/√2 ≈ 0.516% of ω_C·dt = 0.7071 rad — but the dispersion DOES have
      such a mode at higher N (continuum limit) — then N=32 Mode III is
      a finite-N artifact, not a fundamental finding about K4-TLM at the
      bound-state-question scale.

      METHODOLOGY: Run V-block (K4-TLM scatter+connect transmission
      eigsolve via shift-invert at sigma=exp(i·ω_C·dt), per doc 73_ §2)
      at N=64. Single seed (GT_corpus, R/r=φ²) suffices — at N=32 all
      three GT-family seeds clustered near the same closest-mode phase
      (5th-decimal differentiation), so seed-dependent shifts are
      sub-leading vs lattice-resolution shifts. Two-tier comparison:

      RESOLUTION-TREND PASS criteria (binary, both required):

      (a) Gap-closure test:
          |phase_N64_closest - ω_C·dt|  >  0.5 × |phase_N32_closest - ω_C·dt|
          Equivalently: gap at N=64 retains > 50% of gap at N=32.
          Reading: If gap is preserved at N=64, the K4-TLM dispersion at
          GT geometry has a structural absence of eigenmodes at ω_C·dt;
          this is a real lattice-physics finding regardless of N.

      (b) Cluster-location stability:
          phase_N64_closest is within 1% of phase_N32_closest = 0.71574 rad.
          Reading: If the cluster moves coherently (preserves relative
          structure), it's a lattice-mode signature; not noise.

      FALSIFICATION (any one):

      - (a) fails: gap at N=64 is < 50% of N=32 gap → N=32 Mode III is
        finite-N artifact. The dispersion at higher N gets closer to
        ω_C·dt; corpus GT geometry may yet be correct in continuum limit.
        Subsequent step: run at N=80 (F17-K v2-v2 lattice scale) to
        confirm trend.
      - (b) fails: cluster phase shifts by >1% between N=32 and N=64,
        or disperses (no clear cluster). Reading: lattice mode at N=32
        wasn't a stable structural feature; finite-N artifact of a
        different kind. Methodology issue.

      LATTICE GEOMETRY (frozen at this commit):
      - N=64
      - PML=4 (same as N=32)
      - R_anchor=10.0 (same — keeps shell geometry comparable to N=32 run;
        relative shell-to-lattice ratio decreases by 2x, providing a
        well-defined "more lattice between shell and PML boundary"
        comparison)
      - GT_corpus seed only (R=10, r=10/φ²≈3.82)
      - Engine: A28 + Cosserat self-terms enabled
      - V-block eigsolve: scipy.sparse.linalg.eigs(T_op3, k=20,
        sigma=exp(i/√2), which='LM', tol=1e-6)

      WALL-TIME ESTIMATE: V-block dim at N=64 = 4·N_active = 4·2·(N/2)³
      = 4·2·32³ = 262144. T_op3 has ~8 nz/row → ~2M nonzeros.
      eigsh shift-invert ~30-90s. Single-seed run ~1-3 min.

      Cos-block deferred to follow-up at N=64 (much costlier; not part
      of this resolution-trend pred). The pred specifically addresses
      auditor concern #3: distinguish "real K4-TLM Mode III" from
      "finite-N artifact of N=32 lattice."

      Commits land separately:
      - This commit: pred frozen
      - Follow-up commit: r7_lattice_resolution_sweep.py driver build +
