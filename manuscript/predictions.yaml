      MOTIVATION: R7.1 V-block at N=32 + N=64 + dual-criterion is now
      canonically Mode III (V-pressure sector empty at corpus GT geometry).
      The three-storage-mode picture per doc 66_ §17.2 has the bound state
      potentially in V-pressure (V-block, tested empty), ε-strain or
      κ-curvature (Cosserat (u, ω) — Cos-block, tested at N=32 only with
      frequency criterion → Mode III), or Φ_link (third LC tank, not
      directly probed by either block). This pred tests the Cos-block at
      N=64 with dual-criterion frequency + topology to definitively
      adjudicate whether the (2,3) bound state lives in the Cosserat sector.

      METHODOLOGY:
      - Engine: A28 + Cosserat self-terms enabled (post-Round-6 default).
      - Lattice: N=64, PML=4, R_anchor=10, GT_corpus seed only (R/r=φ²).
      - K_cos = ∂²W/∂(u, ω)² at seed via FD HVP LinearOperator (per
        r7_k4tlm_scattering_lctank.py build_K_cos_op pattern, extended to
        joint (u, ω) state).
      - Eigsolve: shift-invert at sigma=ω_C²=1 with explicit OPinv via
        inner GMRES (rtol=1e-3, maxiter=300) per r7_cos_block_shift_invert.py
        pattern. k=20 eigenvalues nearest σ.
      - Topology check: for closest eigenvalue within α PASS tolerance,
        compute shell fraction on the ω-component of the eigenvector
        (analogous to V-block topology check via shell_localization).
        Shell defined as ±r_minor of the (R=10, r=10/φ²) torus shell.

      DUAL-CRITERION FALSIFICATION (per doc 74_ §7 + A39 v2 + Grant
      adjudication 2026-04-26: shell-fraction threshold locked at 80%):

      Mode I (corpus vindicated in Cosserat sector):
        Frequency criterion: ∃ eigenvalue λ_n with |√λ_n - ω_C| < α·ω_C
        AND
        Topology criterion: shell_fraction ≥ 0.80
        Reading: Cosserat sector hosts the (2,3) bound state at corpus GT
        geometry, tightly localized at the (R, r) shell. Doc 66_ §17.2
        three-storage-mode picture confirmed: ε-strain or κ-curvature is
        the bound-state-hosting LC tank. Round 7 closes with corpus
        vindicated.

      Mode I-FAIL (insufficient localization or bulk-mode coincidence):
        Frequency criterion passes BUT shell_fraction < 0.80.
        Two informational sub-readings:
          (a) 0.10 ≤ shell_fraction < 0.80: partial localization;
              eigvec has shell preference but significant bulk leak.
              Reading: ambiguous — could indicate hybrid V↔ω mode (which
              §3.1.1 V=0 decoupling suggests should NOT exist at this seed,
              hence threshold = 80%) OR a true bound state with stronger-
              than-expected lattice-discretization spread.
          (b) shell_fraction < 0.10: bulk-mode coincidence (band-density
              artifact). Same failure mode V-block hit at N=64 per
              [doc 74_ §7 third flip](74_r7_k4tlm_lctank_run_result.md#7).
              Reading: Cosserat sector has bulk modes at ω_C² due to band
              density, but no localized (2,3) bound state.
        Either sub-reading: Cosserat-sector bound-state hypothesis FAILS.
        Round 8 Φ_link sector becomes the cleanest gap.

      Mode III (Cosserat sector also empty):
        No eigenvalue within α tolerance regardless of localization.
        Reading: V-pressure AND ε-strain/κ-curvature both empty.
        Round 8 Φ_link sector becomes the cleanest gap.

      THRESHOLD ADJUDICATION (locked 2026-04-26):
      Threshold = 80% locked per Grant adjudication. Substantive reason:
      §3.1.1 V=0 decoupling means no cross-coupling channel at seed, so
      genuine Cos-block bound-state has no physical mechanism for V↔ω
      hybrid leak. Should be tightly localized (>80% at the shell) absent
      lattice-discretization spread. Sub-80% indicates either partial
      localization (suspicious) or bulk-mode artifact.
      Auditor noted either 50% or 80% would correctly catch V-block-style
      bulk-mode failure (V-block was 1.13%, orders of magnitude below
