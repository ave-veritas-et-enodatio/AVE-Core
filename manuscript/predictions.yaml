# AVE Master Prediction Manifest
#
# Structured claim graph for Tier-2 rigor. Each prediction in the public-facing
# README and LIVING_REFERENCE master tables MUST have a matching entry here.
# Entries link back to:
#   - manuscript labels (\label{} targets) where the derivation lives
#   - constants.py symbols that carry the predicted numeric value
#   - observed values with their source
#
# The claim_graph_validator.py script verifies:
#   1. Every entry's derivation_label resolves to a \label{} in manuscript/**/*.tex
#   2. Every entry's constants_py_symbol (if present) resolves in src/ave/core/constants.py
#   3. Numeric agreement between predicted_value and the corresponding constants.py symbol
#   4. Public-table coverage: every row in README/LIVING_REFERENCE must map to an entry
#
# ─── Entry schema ────────────────────────────────────────────────────────────
# id:                    stable identifier (P01, P02, ...) — never re-use
# name:                  short human-readable name
# type:                  classification (A1 rule)
#                          derived_prediction   — genuine forward prediction
#                          axiom_manifestation  — axiom expressed at a new scale
#                          identity             — definitional; 0% is trivially true
#                          consistency_check    — reproduces a known result
#                          engineering_limit    — theoretical bound
# derivation_label:      \label{} target in manuscript/**/*.tex
# constants_py_symbol:   (optional) name in src/ave/core/constants.py
# predicted_value:       (optional) numeric value for validator to cross-check
# predicted_unit:        (optional) unit annotation
# observed_value:        (optional) measured value
# observed_source:       (optional) e.g. "CODATA 2022", "PDG 2022"
# error_percent:         (optional) |pred - obs| / obs × 100
# axioms_used:           list of axiom numbers (1-4) the derivation depends on
# public_in_readme:      true if appears in README master table
# public_in_living_ref:  true if appears in LIVING_REFERENCE master table
# notes:                 free-form explanation
# ────────────────────────────────────────────────────────────────────────────

