      K_V = K4-TLM wave operator on V with z(x;R,r) = z(A²(ω_seed)) per Op14.
      K_ω = Cosserat sector wave/elastic operator on ω.
      C_Vω, C_ωV = cross-coupling blocks encoding Op14 K4↔Cosserat coupling.
      M_V, M_ω = block-diagonal mass matrices.

      AT V=0 SEED (the natural starting point — seed only sets ω): cross-blocks
      vanish (Op14 multiplicative in V), block matrix decouples. Eigsh returns
      V-block eigenmodes (K4 wave on Cosserat backdrop) AND ω-block eigenmodes
      (Cosserat-sector bound state) SIMULTANEOUSLY. This is desired behavior
      per doc 72_ §3.1.1 footnote — exposes which sector the bound state lives
      in. CANNOT find genuinely hybrid (V,ω) eigenmodes requiring V≠0 ∧ ω≠0;
      that's Round 8 if mode (III) at V=0 + evidence to pursue hybrid.

      Lattice: N=32, R_anchor=10. Sparse generalized eigsh dim ≈ 7·N³ ≈ 230K
      (4 K4-port + 3 ω components per node), tractable for
      scipy.sparse.linalg.eigsh(A, M=B, k=10, sigma=ω_C², which='LM').

      Engine: A28 + Cosserat self-terms enabled.
      A26 amplitude guard at step 0 (peak |ω| ∈ [0.85, 1.15]·0.3π for GT-family).

