      - F17K_cos_endpoint: R=10, r=10/3.40≈2.94 (F17-K v2-v2 Cosserat-energy)
      - F17K_s11_endpoint: R=10, r=10/1.03≈9.71 (F17-K v2-v2 coupled-S₁₁)
      - vacuum_control:    random low-amplitude (peak |ω|=0.05) — negative control

      All GT-family seeds use amplitude_scale = 0.3 / (√3/2) ≈ 0.3464.

      EIGENMODE PASS criteria (binary, all three required for headline PASS):
      - "at ω_Compton": |√λ - ω_C| < α · ω_C
      - Q-factor from boundary impedance: |Q - 1/α| / (1/α) < 0.05 (5% relative)
      - Topological crossing-count: c_eigvec = 3 (winding number on
