      ESTIMATED COST: ~3-4 hours per seed at N=64 with shift-invert + GMRES
      (per r7_cos_block_shift_invert.py per-seed timing scaled by 8×
      volume from N=32 to N=64). Single seed (GT_corpus) initially; if
