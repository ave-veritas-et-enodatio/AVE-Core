  - id: P_phase6_self_consistent_orbit_hunt
    name: "Round 8 Move 5: single-electron (V≠0 ∧ ω≠0) ansatz at corpus GT settles into self-stable nonlinear orbit at ω_C with (2,3) topology preserved"
    type: derived_prediction
