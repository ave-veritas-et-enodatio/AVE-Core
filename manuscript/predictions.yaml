      R7.2 pair injection, Test B v2/v3 8-port spatial, path (a)/(b)
      12-loop-node) all tested. Those tested for spatial winding that
      AVE's universal operators don't predict per doc 07 §3.

      METHODOLOGY:
      - Engine setup IDENTICAL to Move 5 (P_phase6_self_consistent_orbit_hunt):
        VacuumEngine3D at N=32, A28 + Cosserat self-terms, no external drive,
        seed both V_inc and ω with corpus (2,3) ansatz at corpus GT (R=10,
        r=R/φ²), peak |ω| = 0.3π via A26 amplitude scale, V_amp=0.14 (peak
