  - id: P_phase5_bond_scale_phasor_trajectory
    name: "R7.1 Test B (doc 28_ §5.1): single A-B bond V_inc/V_ref phase-space phasor trajectory traces Golden Torus with R/r ≈ φ²"
    type: derived_prediction
    pre_registered: true
    research_doc: "research/L3_electron_soliton/28_two_node_electron_synthesis.md"
    test_file: "src/scripts/vol_1_foundations/test_b_bond_scale_phasor.py"
    axioms_used: [1, 2, 4]
    public_in_readme: false
    public_in_living_ref: false
    notes: |
      Test B per audit on commit 88ec7c3 + doc 28_ §5.1 specification (test
      pending since doc 28_ written). Tests the BOND-SCALE phase-space
      Golden Torus hypothesis — structurally different from R7.1's
      Cosserat-continuum-scale extended (2,3) bound state test.

      Per doc 28_ two-node-electron synthesis: "The electron is a flux
      oscillation between two adjacent K4 nodes... The Golden Torus
      geometry that gives α⁻¹ = 137 lives in PHASE SPACE, not real space."

      The empirical claim per doc 28_ §5.1: extract (V_inc, V_ref) phasor
      trajectory on a single A-B bond from a driven TLM simulation; in
      (Re, Im) phase-space the trajectory should trace a Golden Torus
      with major/minor axis ratio R/r ≈ φ² ≈ 2.618.

      METHODOLOGY:
      - Engine: VacuumEngine3D at N=32 (sufficient for single-bond
        physics; smaller N reduces wall time vs doc 28_'s "96³" target).
        A28 + Cosserat self-terms enabled (post-Round-6 default).
      - Drive: AutoresonantCWSource at ω = ω_Compton in natural units
        (= 1.0; carrier wavelength λ = 2π/ω_C ≈ 6.28 cells).
        Amplitude: 0.1·V_SNAP (small-signal regime to avoid saturation).
        Drive duration: ramp 5 periods + sustain 50 periods + decay 2.
      - Site selection: A-B bond near lattice center (per
        find_central_bond pattern from phase5 drivers).
      - Recording: V_inc[A_idx, port=0](t) AND V_ref[A_idx, port=0](t)
        at every K4-TLM substep over the sustain window. Subtract
        transient (first 10 periods).
      - Phase-space construction: parametric plot of (V_inc(t), V_ref(t))
        for t in [transient_end, sustain_end].

      PASS criterion (per doc 28_ §5.1):
        Trajectory is a closed curve in (V_inc, V_ref) plane with
        major axis R, minor axis r, satisfying R/r = φ² ± 0.10
        (within ~4% of corpus claim).

      FAIL conditions:
        - Trajectory is a single ellipse (single-frequency oscillation,
          no (2,3) winding) → bond doesn't host (2,3) phase-space pattern
        - Trajectory is open/chaotic (no steady-state pattern) → drive
          regime wrong, or bond doesn't ring up at ω_C
        - Trajectory is closed but R/r ≠ φ² ± 0.10 → bond hosts a
          phase-space pattern but NOT the corpus Golden Torus
        - Aspect ratio extraction is dominated by drive transient → run
          longer sustain, fail by methodology

      DUAL-CRITERION DIAGNOSTICS (informational, not PASS):
        - Lissajous lobe count: a (2,3) Lissajous figure has specific
          lobe count (5 or 6 depending on phase). Visual inspection
          + automated lobe-counting via local-extrema analysis.
        - Spectral content: FFT(V_inc(t)) for two dominant peaks
          ω₁, ω₂ with ω₂/ω₁ = 3/2 (or 2/3) consistent with (2,3) winding.

      ADJUDICATION CATEGORIES:

      Mode I (bond-scale hypothesis vindicated):
        Closed trajectory + R/r = φ² ± 0.10 + (Lissajous structure
        consistent with (2,3) winding OR spectral 3/2 ratio)
        Reading: Doc 28_ two-node-electron hypothesis confirmed
        empirically. The electron at corpus claim IS a single A-B
        bond LC tank with (2,3) phase-space winding.

      Mode II (closed trajectory, wrong R/r):
        Closed trajectory + R/r ≠ φ² ± 0.10
        Reading: Bond hosts a stable phase-space pattern at this
        drive but NOT the corpus Golden Torus. Could indicate
        different (R, r) phase-space attractor OR drive amplitude/
        frequency mismatch from corpus electron config.

      Mode III (no closed pattern):
        Open trajectory or simple ellipse
        Reading: Bond-scale (2,3) phase-space hypothesis fails at
        this drive. The bond LC tank either doesn't ring up at ω_C
        with this drive, OR doesn't have multi-frequency structure
        needed for (2,3) winding.

      ESTIMATED COST: ~2-3 hr wall time per doc 28_ §5.1 estimate.

      Test A and Test B together complete the corpus-canonical electron
      eigenmode test set: Test A probes the Cosserat-continuum-scale
      extended (2,3) bound state hypothesis; Test B probes the bond-scale
      phase-space (V_inc, V_ref) Golden Torus hypothesis. Both must
      land before Round 7 closure narrative is finalized; r8.9 manual
      consolidates both per Grant cadence directive.

      SUPERSEDED 2026-04-26 by P_phase5_bond_scale_phasor_v2_multipoint:
      audit on commit 53c2ce9 caught that single-port temporal sampling
      cannot answer doc 28_ §5.1's question — the (2,3) winding lives
      in spatial θ(s) along the bond per doc 26_ §1, not in temporal
      harmonics at one s. Single-port temporal phasor traces a CIRCLE
      regardless of drive amp; v1 Mode II (R/r = 19) at 0.1·V_SNAP
      and v1-retry Mode II (R/r = 19.2) at 0.5·V_SNAP are consistent
      with a single-frequency ellipse at one spatial point. v2 below
      replaces this pred with the spatially-correct test.

  - id: P_phase5_bond_scale_phasor_v2_multipoint
    name: "R7.1 Test B v2 (doc 26_ §3 spatial reading): multi-port phasor envelope across A-B bond cluster gives spatial R/r ≈ φ²"
    type: derived_prediction
