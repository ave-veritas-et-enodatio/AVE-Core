    notes: |
      DRAFT pre-registration for Cos-block N=64 dual-criterion bound-state
      test, per auditor concern #4 + A39 v2 dual-criterion discipline. Not
      yet pre_registered: true — awaiting Grant adjudication on the
      shell-fraction threshold parameter (load-bearing per A39 v2; pred
