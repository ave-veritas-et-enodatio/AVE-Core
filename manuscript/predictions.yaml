        A ∈ {0.01, 0.1, 0.5, 1.0, 2.0}. As packet amplitude grows, local
        |∇ω|² at packet location grows; saturation kernel S_kappa_sq
        drops; under V·S, T·1 asymmetry, observed wave speed drifts.

