<svg width="900" height="600" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- Standard Drop Shadow Filter -->
        <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
            <feDropShadow dx="3" dy="3" stdDeviation="4" flood-opacity="0.3"/>
        </filter>
        <!-- Gradients -->
        <linearGradient id="axiomGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#111827;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#374151;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="topoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#047857;stop-opacity:1" /> <!-- Green -->
            <stop offset="100%" style="stop-color:#10B981;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="legacyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#B91C1C;stop-opacity:1" /> <!-- Red -->
            <stop offset="100%" style="stop-color:#EF4444;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="outputGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#4338CA;stop-opacity:1" /> <!-- Indigo -->
            <stop offset="100%" style="stop-color:#6366F1;stop-opacity:1" />
        </linearGradient>
    </defs>

    <!-- Background -->
    <rect width="100%" height="100%" fill="#F3F4F6"/>
    
    <!-- Title -->
    <text x="450" y="40" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#1F2937">
        AVE Semiconductor Doping: Directed Acyclic Parameter Verification
    </text>
    <text x="450" y="65" font-family="Arial, Helvetica, sans-serif" font-size="14" text-anchor="middle" fill="#4B5563">
        Zero statistical thermal scaling. Strict topological compliance constraint evaluation.
    </text>

    <!-- ============================================== -->
    <!-- LAYER 1: First Principles (Axioms)             -->
    <!-- ============================================== -->
    <g transform="translate(450, 100)" font-family="Arial, Helvetica, sans-serif" text-anchor="middle" filter="url(#shadow)">
        <rect x="-150" y="0" width="300" height="60" rx="8" fill="url(#axiomGrad)"/>
        <text x="0" y="25" fill="#FFFFFF" font-weight="bold" font-size="16">Fundamental Constants</text>
        <text x="0" y="45" fill="#D1D5DB" font-size="14">α, ℏ, c, e₀, Z</text>
    </g>

    <!-- Arrow L1 to L2 -->
    <path d="M 450 160 L 450 200" stroke="#6B7280" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

    <!-- ============================================== -->
    <!-- LAYER 2: Binding Engine (Topology)             -->
    <!-- ============================================== -->
    <g transform="translate(450, 200)" font-family="Arial, Helvetica, sans-serif" text-anchor="middle" filter="url(#shadow)">
        <rect x="-180" y="0" width="360" height="60" rx="8" fill="url(#topoGrad)"/>
        <text x="0" y="25" fill="#FFFFFF" font-weight="bold" font-size="16">Semiconductor Binding Engine</text>
        <text x="0" y="45" fill="#E5E7EB" font-size="14">V_BR = 6·α·ℏ·c/D_intra  |  M = 1/(1-(V_R/V_BR)⁵)</text>
    </g>

    <!-- Arrow L2 to Left (Boron) -->
    <path d="M 400 260 L 250 320" stroke="#10B981" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
    
    <!-- Arrow L2 to Right (Phosphorus) -->
    <path d="M 500 260 L 650 320" stroke="#10B981" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

    <!-- ============================================== -->
    <!-- LAYER 3: Macroscopic Doping Strain             -->
    <!-- ============================================== -->
    <!-- Acceptor -->
    <g transform="translate(250, 320)" font-family="Arial, Helvetica, sans-serif" text-anchor="middle" filter="url(#shadow)">
        <rect x="-120" y="0" width="240" height="60" rx="8" fill="url(#topoGrad)"/>
        <text x="0" y="25" fill="#FFFFFF" font-weight="bold" font-size="16">Boron Void (Z=5)</text>
        <text x="0" y="45" fill="#E5E7EB" font-size="14">Inductive Defect → Low V_R</text>
    </g>

    <!-- Donor -->
    <g transform="translate(650, 320)" font-family="Arial, Helvetica, sans-serif" text-anchor="middle" filter="url(#shadow)">
        <rect x="-120" y="0" width="240" height="60" rx="8" fill="url(#topoGrad)"/>
        <text x="0" y="25" fill="#FFFFFF" font-weight="bold" font-size="16">Phosphorus Surplus (Z=15)</text>
        <text x="0" y="45" fill="#E5E7EB" font-size="14">Structural Load → High V_R</text>
    </g>

    <!-- Arrows L3 to L4 -->
    <path d="M 250 380 L 400 450" stroke="#6366F1" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
    <path d="M 650 380 L 500 450" stroke="#6366F1" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

    <!-- ============================================== -->
    <!-- LAYER 4: Component Exporters (atopile)         -->
    <!-- ============================================== -->
    <g transform="translate(450, 450)" font-family="Arial, Helvetica, sans-serif" text-anchor="middle" filter="url(#shadow)">
        <rect x="-180" y="0" width="360" height="70" rx="8" fill="url(#outputGrad)"/>
        <text x="0" y="25" fill="#FFFFFF" font-weight="bold" font-size="16">Declarative Electronics &amp; S-Parameters</text>
        <text x="0" y="45" fill="#E0E7FF" font-size="14">V_bi = ΔE(Topology_A) - ΔE(Topology_B)</text>
        <text x="0" y="60" fill="#E0E7FF" font-size="14">T² = 4Z₁Z₂ / (Z₁+Z₂)²</text>
    </g>

    <!-- ============================================== -->
    <!-- LEGACY PHYSICS (CULLING DISPLAY)               -->
    <!-- ============================================== -->
    <g transform="translate(80, 200)" font-family="Arial, Helvetica, sans-serif" text-anchor="middle" filter="url(#shadow)">
        <rect x="0" y="0" width="180" height="100" rx="8" fill="url(#legacyGrad)"/>
        <text x="90" y="25" fill="#FFFFFF" font-weight="bold" font-size="14">OBSOLETE MATH</text>
        <text x="90" y="45" fill="#FECACA" font-size="12" text-decoration="line-through">Fermi-Dirac Arrays</text>
        <text x="90" y="65" fill="#FECACA" font-size="12" text-decoration="line-through">Effective Mass (m*)</text>
        <text x="90" y="85" fill="#FECACA" font-size="12" text-decoration="line-through">Charge Mobilities (μ)</text>
    </g>

    <!-- Red X over Legacy -->
    <path d="M 120 220 L 220 280 M 220 220 L 120 280" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round"/>

    <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#6B7280"/>
        </marker>
    </defs>
</svg>
